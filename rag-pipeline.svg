<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090E17"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="rgba(56, 189, 248, 0.08)"/>
      <stop offset="100%" stop-color="rgba(2, 6, 23, 0)"/>
    </radialGradient>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
    </pattern>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#475569"/>
    </marker>

    <!-- Typography Styles -->
    <style>
      .badge { font: 700 12px "JetBrains Mono", monospace, sans-serif; fill: #38BDF8; letter-spacing: 0.12em; text-transform: uppercase; }
      .title { font: 800 48px Inter, -apple-system, sans-serif; fill: #FFFFFF; letter-spacing: -0.02em; }
      .subtitle { font: 500 18px Inter, -apple-system, sans-serif; fill: #94A3B8; }
      .cardTitle { font: 700 22px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .cardMeta { font: 500 14px Inter, -apple-system, sans-serif; fill: #64748B; }
      .pillText { font: 600 14px Inter, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#grid)"/>
  <rect width="1200" height="627" fill="url(#spotlight)"/>
  <rect x="16" y="16" width="1168" height="595" rx="24" fill="none" stroke="#1E293B" stroke-width="1.5" opacity="0.5"/>

  <!-- Top Header Section -->
  <!-- Badge -->
  <rect x="490" y="70" width="220" height="28" rx="14" fill="rgba(56, 189, 248, 0.1)" stroke="rgba(56, 189, 248, 0.2)"/>
  <text x="600" y="89" text-anchor="middle" class="badge">AI KNOWLEDGE SYSTEM</text>

  <!-- Title & Subtitle -->
  <text x="600" y="145" text-anchor="middle" class="title">Multi-Source RAG Pipeline</text>
  <text x="600" y="185" text-anchor="middle" class="subtitle">Hybrid Search • Concept Graph • Adaptive Retrieval</text>

  <!-- Connectors (Rendered under cards) -->
  <path d="M 380 360 L 450 360" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 740 360 L 810 360" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Card 1: Data Ingestion -->
  <g filter="url(#shadow)">
    <!-- Main Card Body -->
    <rect x="100" y="250" width="280" height="240" rx="16" fill="#0B1120" stroke="#1E293B" stroke-width="1"/>
    <rect x="100" y="250" width="4" height="240" rx="2" fill="#14B8A6"/> <!-- Accent Strip -->
    
    <!-- Content -->
    <text x="130" y="300" class="cardTitle">Data Ingestion</text>
    <text x="130" y="325" class="cardMeta">ArXiv • Instagram • GitHub</text>
    
    <!-- Pills -->
    <rect x="130" y="360" width="220" height="42" rx="8" fill="#0F172A" stroke="rgba(20, 184, 166, 0.2)" stroke-width="1"/>
    <circle cx="148" cy="381" r="4" fill="#14B8A6"/>
    <text x="164" y="386" class="pillText" fill="#A7F3D0">Mistral OCR / Whisper</text>
    
    <rect x="130" y="414" width="220" height="42" rx="8" fill="#0F172A" stroke="rgba(20, 184, 166, 0.2)" stroke-width="1"/>
    <circle cx="148" cy="435" r="4" fill="#14B8A6"/>
    <text x="164" y="440" class="pillText" fill="#A7F3D0">Claude Batch Summaries</text>
  </g>

  <!-- Card 2: Knowledge Storage -->
  <g filter="url(#shadow)">
    <rect x="460" y="250" width="280" height="240" rx="16" fill="#0B1120" stroke="#1E293B" stroke-width="1"/>
    <rect x="460" y="250" width="4" height="240" rx="2" fill="#3B82F6"/>
    
    <text x="490" y="300" class="cardTitle">Knowledge Storage</text>
    <text x="490" y="325" class="cardMeta">SQLite Unified Store</text>
    
    <rect x="490" y="360" width="220" height="42" rx="8" fill="#0F172A" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
    <circle cx="508" cy="381" r="4" fill="#3B82F6"/>
    <text x="524" y="386" class="pillText" fill="#BFDBFE">NetworkX Concept Graph</text>
    
    <rect x="490" y="414" width="220" height="42" rx="8" fill="#0F172A" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1"/>
    <circle cx="508" cy="435" r="4" fill="#3B82F6"/>
    <text x="524" y="440" class="pillText" fill="#BFDBFE">768-dim Vector Embeddings</text>
  </g>

  <!-- Card 3: Hybrid Retrieval -->
  <g filter="url(#shadow)">
    <rect x="820" y="250" width="280" height="240" rx="16" fill="#0B1120" stroke="#1E293B" stroke-width="1"/>
    <rect x="820" y="250" width="4" height="240" rx="2" fill="#8B5CF6"/>
    
    <text x="850" y="300" class="cardTitle">Hybrid Retrieval</text>
    <text x="850" y="325" class="cardMeta">Semantic + FTS5 Match</text>
    
    <rect x="850" y="360" width="220" height="42" rx="8" fill="#0F172A" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1"/>
    <circle cx="868" cy="381" r="4" fill="#8B5CF6"/>
    <text x="884" y="386" class="pillText" fill="#DDD6FE">Adaptive Weighting</text>
    
    <rect x="850" y="414" width="220" height="42" rx="8" fill="#0F172A" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1"/>
    <circle cx="868" cy="435" r="4" fill="#8B5CF6"/>
    <text x="884" y="440" class="pillText" fill="#DDD6FE">LLM Response Generation</text>
  </g>
</svg>